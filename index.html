<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Feed Tracker</title>
    <style>
        :root {
            --primary-blue: #1a73e8;
            --text-main: #1a1a1a;
            --text-secondary: #70757a;
            --border-color: #e8eaed;
            --bg-gray: #f8f9fa;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #ffffff; 
            padding: 20px; 
            color: var(--text-main); 
            max-width: 500px; 
            margin: 0 auto;
            line-height: 1.4;
        }

        h1 { font-size: 32px; font-weight: 800; margin: 20px 0; letter-spacing: -0.5px; }
        
        .input-container { margin-bottom: 24px; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #ced4da; 
            border-radius: 12px; 
            font-size: 18px; 
            box-sizing: border-box; 
            background: #ffffff;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        
        input:focus { outline: none; border-color: var(--primary-blue); }

        .btn-submit { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary-blue); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn-submit:active { opacity: 0.8; }

        .stats-bar { 
            display: flex; 
            justify-content: space-between; 
            padding: 16px 0; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 16px;
            font-weight: 500;
        }

        .history-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 40px; 
            margin-bottom: 10px;
        }
        
        h2 { font-size: 24px; font-weight: 700; margin: 0; }

        .day-section { margin-top: 24px; }
        
        .day-title { 
            color: var(--text-secondary); 
            font-size: 14px; 
            font-weight: 600;
            margin-bottom: 12px; 
            text-transform: capitalize;
        }

        .log-card { 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            margin-bottom: 8px; 
            padding: 16px; 
            display: flex; 
            justify-content: space-between; 
            font-weight: 600;
            font-size: 16px;
        }

        .day-summary { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 4px; 
            color: var(--text-secondary); 
            font-size: 14px; 
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .btn-clear { 
            background: none; 
            border: none; 
            color: #d93025; 
            font-size: 13px; 
            margin-top: 60px; 
            width: 100%;
            padding: 20px;
            cursor: pointer;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <h1>Log feeding</h1>

    <div class="input-container">
        <input type="number" id="volume" placeholder="How many ml" inputmode="decimal">
        <button class="btn-submit" id="logBtn">Submit</button>
    </div>

    <div class="stats-bar">
        <span>Last 24h</span>
        <span id="rolling-24h">0 ml</span>
    </div>

    <div class="history-header">
        <h2>History</h2>
        <span style="color:var(--primary-blue)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </span>
    </div>

    <div id="history-container">
        </div>
    
    <button class="btn-clear" id="clearBtn">Delete All History</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // IMPORTANT: Replace this with your actual Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCecVwwq7pHQs0enaGUA6wUZG-Wz4KQ94c",
            authDomain: "feeder-99e8b.firebaseapp.com",
            projectId: "feeder-99e8b",
            storageBucket: "feeder-99e8b.firebasestorage.app",
            messagingSenderId: "662741977621",
            appId: "1:662741977621:web:e99e0beccb65b050c41c1c",
            measurementId: "G-F9Q342KXGC",
            databaseURL: "https://feeder-99e8b-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const logsRef = ref(db, "feedings");

        // Submit Logic
        document.getElementById("logBtn").onclick = () => {
            const volInput = document.getElementById("volume");
            const vol = volInput.value;
            if (!vol) return;

            push(logsRef, {
                amount: parseFloat(vol),
                timestamp: Date.now()
            });
            volInput.value = "";
        };

        // UI Update Logic
        onValue(logsRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById("history-container");
            const rollingDisplay = document.getElementById("rolling-24h");
            container.innerHTML = "";

            if (!data) {
                rollingDisplay.innerText = "0 ml";
                return;
            }

            const allLogs = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);
            
            // 1. Calculate Rolling 24h
            const now = Date.now();
            const oneDayAgo = now - (24 * 60 * 60 * 1000);
            const total24h = allLogs
                .filter(log => log.timestamp > oneDayAgo)
                .reduce((sum, log) => sum + log.amount, 0);
            rollingDisplay.innerText = `${total24h} ml`;

            // 2. Group by Calendar Day
            const groups = allLogs.reduce((acc, log) => {
                const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' };
                const dateKey = new Date(log.timestamp).toLocaleDateString('en-GB', dateOptions);
                if (!acc[dateKey]) acc[dateKey] = [];
                acc[dateKey].push(log);
                return acc;
            }, {});

            // 3. Build HTML
            for (const [date, dayLogs] of Object.entries(groups)) {
                let dayTotal = 0;
                let dayHtml = `<div class="day-section"><div class="day-title">${date}</div>`;
                
                dayLogs.forEach(log => {
                    const time = new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    dayTotal += log.amount;
                    dayHtml += `
                        <div class="log-card">
                            <span>${time}</span>
                            <span>${log.amount} ml</span>
                        </div>`;
                });

                dayHtml += `
                    <div class="day-summary">
                        <span>${dayLogs.length} times</span>
                        <span>${dayTotal} ml</span>
                    </div>
                </div>`;
                container.innerHTML += dayHtml;
            }
        });

        // Clear History Logic
        document.getElementById("clearBtn").onclick = () => {
            if (confirm("Are you sure you want to delete all feeding records?")) {
                remove(logsRef);
            }
        };
    </script>
</body>
</html>
